name: Revalidate Insights

on:
  push:
    branches:
      - main
    paths:
      - "insights/*.md"
  workflow_dispatch:

jobs:
  revalidate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
        run: |
          if [ -z "$REVALIDATE_URL" ]; then
            echo "Missing REVALIDATE_URL secret"
            exit 1
          fi

          if [ -z "$REVALIDATE_SECRET" ]; then
            echo "Missing REVALIDATE_SECRET secret"
            exit 1
          fi

      - name: Trigger app revalidation
        env:
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
        run: |
          response_file="$(mktemp)"
          status_code="$(curl -sS -o "$response_file" -w "%{http_code}" \
            -X POST "$REVALIDATE_URL" \
            -H "x-revalidate-secret: $REVALIDATE_SECRET")"

          cat "$response_file"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "Revalidation failed with status $status_code"
            exit 1
          fi
